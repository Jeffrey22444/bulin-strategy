strategy:
  name: "bbmr_v3_2"
  mode: "research_scaffold"
  allow_ai_signal: false
  allow_breakout_trade: false
  allow_live_trading: false
  allow_leverage: false

symbols:
  default: ["BTC", "ETH", "SOL"]

timeframes:
  signal_tf: "1h"
  entry_confirm_tf: "15m"
  execution_tf: "5m"

bollinger:
  bb_period: 20
  bb_std_mult: 2.0
  bandwidth_lookback: 60

rsi:
  period: 14
  oversold: 30
  overbought: 70

rsi_flat_entry_filter:
  enabled: true
  low: 45
  high: 55
  bars: 7

atr:
  period: 14

stop_loss:
  sl_atr_mult_mr: 2.5
  min_stop_pct: 0.025

bandwidth_state:
  squeeze_pct: 20
  high_pct: 80
  early_fail_bw_pct: 85

volume:
  ma_period: 20
  weak: 1.0
  reject: 1.8

middle_band_slope:
  slope_n: 5
  slope_max: 0.006

band_walking:
  walk_bars: 6
  walk_min_side_bars: 5
  walk_min_near_bars: 4
  walk_min_outside_bars: 3
  walk_atr_dist: 0.35

entry_confirmation:
  reentry_bars: 12

profit_target:
  tp_mid_frac: 0.5
  min_profit_r_after_add: 0.10
  keep_dynamic_tp_without_breakeven_floor: true

position_sizing:
  risk_per_trade: 0.005

add_position:
  enabled: true
  max_add_count: 1
  add_size_frac: 0.5
  add_max_total_r: 1.5
  add_trigger_loss_r: 0.5

soft_fail:
  bars: 3

early_fail:
  min_confirmations: 2
  use_bw_expansion: true
  use_shock_volume: true
  use_band_walking: true

costs:
  taker_fee_bps: 0.0
  maker_fee_bps: 0.0
  slippage_bps: 0.0

storage:
  backend: "sqlite"
  sqlite_path: "data/bbmr_v3_2.sqlite3"

safety:
  no_hardcoded_strategy_params: true
  stop_on_undefined_rule: true
  allow_liquidation_price_check: false
  allow_hyperliquid_testnet: false
  allow_live_trading: false
