strategy:
  name: "bbmr_trailing_stop_v1"

bollinger:
  bb_period: 20
  bb_std_mult: 2.0

rsi:
  period: 14
  method: "wilder"
  warmup_bars: 500
  oversold: 40
  overbought: 60
  adverse_slope_oversold: 32
  adverse_slope_overbought: 68

entry_confirmation:
  require_15m_rsi_reversal: false

trailing_stop:
  initial_stop_pct: 0.05
  first_step_risk_reduction: 0.5

adverse_slope_take_profit:
  enabled: true
  slope_n: 3
  special_slope_threshold_pct: 0.0009
  exspecial_slope_threshold_pct: 0.0025
  special_near_middle_frac: 0.0
  exspecial_near_middle_frac: 0.5

bandwidth_entry_guard:
  enabled: true
  percentile_lookback: 120
  high_percentile: 80
  min_1h_expansion_pct: 0.15

trend_riding:
  mode: live
  opposite_mr_takeover_mode: live
  pending_ttl_hours: 6
  entry_pullback_pct: 0.006
  weakening_slope_threshold_pct: 0.0018
  initial_stop_distance_pct: 0.05

costs:
  taker_fee_bps: 4.5
  maker_fee_bps: 1.5
  slippage_bps: 0.0
